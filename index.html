<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>三相坍缩 - 潜意识情感纠缠解码</title>
    <link href="https://fonts.font.im/css2?family=Noto+Serif+SC:wght@300;400;500;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>

   <style>
        :root { --c-gold: #d4af37; --c-purple: #4a154b; --c-rose: #c5838d; }
        * { font-family: 'Noto Serif SC', serif; user-select: none; -webkit-tap-highlight-color: transparent; box-sizing: border-box; }
        
        /* ⚠️ 核心修复1：加入手机端刘海屏/底部横条安全区适配 */
        body { 
            margin: 0; overflow: hidden; background-color: #05020a; color: #fff; 
            padding-top: env(safe-area-inset-top); 
            padding-bottom: env(safe-area-inset-bottom);
        }

        /* ⚠️ 核心修复2：顶部导航栏独立深色渐变层，强制盖住底部晶体，不和文字打架 */
        header { 
            background: linear-gradient(180deg, rgba(5,2,10,1) 60%, rgba(5,2,10,0) 100%); 
            padding-bottom: 2rem; 
            position: relative;
            z-index: 50; 
        }

        #starfield { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; z-index: 1; pointer-events: none; }

        /* 晶体默认状态 (初始选择男女页面) */
        .scene {
            position: fixed; left: 50%; top: 40%; transform: translate(-50%, -50%) scale(1);
            width: 150px; height: 150px; perspective: 1200px; z-index: 10;
            transition: all 1.2s cubic-bezier(0.4, 0, 0.2, 1); pointer-events: none;
        }
        /* ⚠️ 核心修复3：答题状态下，晶体大幅缩小、变暗，并紧贴顶部，彻底让出屏幕中心 */
        .scene.state-quiz { top: 90px; transform: translate(-50%, 0) scale(0.25); opacity: 0.4; }
        .scene.state-unlock { top: 25%; transform: translate(-50%, -50%) scale(0.5); opacity: 0.4; filter: blur(4px); }

        /* ⚠️ 核心修复4：答题卡片区域强制下压，完美避开晶体和头部 Header */
        .quiz-content-area {
            padding-top: 140px; 
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
        }

        .crystal { width: 100%; height: 100%; position: absolute; transform-style: preserve-3d; animation: spin-3d 15s infinite linear; }
        .face {
            position: absolute; bottom: 0; left: 0; width: 0; height: 0;
            border-left: 75px solid transparent; border-right: 75px solid transparent;
            border-bottom: 140px solid rgba(212, 175, 55, 0.1); transform-origin: 50% 100%;
            backdrop-filter: blur(1px); filter: drop-shadow(0 0 10px rgba(197, 131, 141, 0.4));
        }
        .front  { transform: rotateY(0deg) translateZ(75px) rotateX(31deg); border-bottom-color: rgba(197, 131, 141, 0.4); }
        .right  { transform: rotateY(90deg) translateZ(75px) rotateX(31deg); border-bottom-color: rgba(255, 255, 255, 0.1); }
        .back   { transform: rotateY(180deg) translateZ(75px) rotateX(31deg); border-bottom-color: rgba(74, 21, 75, 0.4); }
        .left   { transform: rotateY(-90deg) translateZ(75px) rotateX(31deg); border-bottom-color: rgba(212, 175, 55, 0.2); }

        .quantum-core-v2 {
            position: absolute; bottom: 45px; left: 50%; transform-style: preserve-3d;
            transform: translate(-50%, 0) translateZ(0); width: 32px; height: 32px;
            animation: core-wobble 5s infinite ease-in-out alternate;
        }
        .disk {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; border-radius: 50%;
            background: radial-gradient(circle, #fff 0%, #fff 15%, var(--c-rose) 40%, var(--c-purple) 70%, transparent 100%);
            box-shadow: 0 0 30px 10px var(--c-rose), 0 0 60px 20px var(--c-purple); opacity: 0.9; backdrop-filter: blur(2px);
        }
        .disk-xy { transform: rotateY(0deg) rotateX(0deg); } .disk-yz { transform: rotateY(90deg); } .disk-xz { transform: rotateX(90deg); }

        @keyframes spin-3d { 0% { transform: rotateX(-12deg) rotateY(0deg); } 100% { transform: rotateX(-12deg) rotateY(360deg); } }
        @keyframes core-wobble { 0% { transform: translate(-50%, 0) translateZ(-5px) scale(0.9); } 100% { transform: translate(-50%, 5px) translateZ(5px) scale(1.1); } }

        .glass-card { 
            background: rgba(20, 5, 30, 0.5); backdrop-filter: blur(12px); 
            border: 1px solid rgba(212, 175, 55, 0.15); box-shadow: 0 10px 40px rgba(0, 0, 0, 0.6), inset 0 0 20px rgba(212, 175, 55, 0.05);
            transition: all 0.3s ease; 
        }
        .gender-btn:hover { border-color: rgba(212, 175, 55, 0.6); transform: translateY(-3px); box-shadow: 0 15px 40px rgba(0, 0, 0, 0.8), 0 0 20px rgba(212, 175, 55, 0.2); }
        .option-item { border-left: 2px solid rgba(255,255,255,0.1); background: linear-gradient(90deg, rgba(255,255,255,0.03) 0%, transparent 100%); }
        .option-item:hover { border-left-color: var(--c-gold); background: linear-gradient(90deg, rgba(212, 175, 55, 0.1) 0%, transparent 100%); padding-left: 1.5rem; }

        .fade-enter-active, .fade-leave-active { transition: opacity 0.5s ease; }
        .fade-enter-from, .fade-leave-to { opacity: 0; }
        .slide-up-enter-active, .slide-up-leave-active { transition: all 0.4s ease; }
        .slide-up-enter-from { opacity: 0; transform: translateY(15px); }
        .slide-up-leave-to { opacity: 0; transform: translateY(-15px); }
    </style>
</head>

        // 星海动画引擎
        const canvas = document.getElementById('starfield');
        const ctx = canvas.getContext('2d');
        let width, height, stars = [];
        function initStars() {
            width = canvas.width = window.innerWidth; height = canvas.height = window.innerHeight; stars = [];
            const starCount = window.innerWidth < 768 ? 400 : 800; 
            for (let i = 0; i < starCount; i++) { stars.push({ x: Math.random() * width, y: Math.random() * height, size: Math.random() * 1.8 + 0.2, speed: Math.random() * 2.5 + 1.0, alpha: Math.random() }); }
        }
        function animateStars() {
            ctx.fillStyle = 'rgba(5, 2, 10, 0.35)'; ctx.fillRect(0, 0, width, height); ctx.fillStyle = 'rgba(230, 200, 255, 1)';
            stars.forEach(star => {
                ctx.globalAlpha = star.alpha; ctx.beginPath(); ctx.arc(star.x, star.y, star.size, 0, Math.PI * 2); ctx.fill();
                star.y -= star.speed; star.alpha += (Math.random() - 0.5) * 0.08;
                if (star.alpha < 0.1) star.alpha = 0.1; if (star.alpha > 0.9) star.alpha = 0.9;
                if (star.y < 0) { star.y = height + 10; star.x = Math.random() * width; star.speed = Math.random() * 2.5 + 1.0; }
            });
            ctx.globalAlpha = 1; requestAnimationFrame(animateStars);
        }
        window.addEventListener('resize', initStars); initStars(); animateStars();

        function shuffleArray(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
            return array;
        }

                    phase.value = 'quiz';

                        currentQIndex.value++;
