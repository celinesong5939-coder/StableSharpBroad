<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>三相坍缩 - 潜意识情感纠缠解码</title>
    <link href="https://fonts.font.im/css2?family=Noto+Serif+SC:wght@300;400;500;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>

    <style>
        :root { --c-gold: #d4af37; --c-purple: #4a154b; --c-rose: #c5838d; }
        * { font-family: 'Noto Serif SC', serif; user-select: none; -webkit-tap-highlight-color: transparent; box-sizing: border-box; }
        body { margin: 0; overflow: hidden; background-color: #05020a; color: #fff; }

        #starfield { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; z-index: 1; pointer-events: none; }

        .scene {
            position: fixed; left: 50%; top: 35%; transform: translate(-50%, -50%) scale(1);
            width: 150px; height: 150px; perspective: 1200px; z-index: 10;
            transition: all 1.2s cubic-bezier(0.4, 0, 0.2, 1); pointer-events: none;
        }
        .scene.state-quiz { top: 80px; transform: translate(-50%, 0) scale(0.4); opacity: 0.8; }
        .scene.state-unlock { top: 25%; transform: translate(-50%, -50%) scale(0.6); opacity: 0.4; filter: blur(4px); }

        .crystal { width: 100%; height: 100%; position: absolute; transform-style: preserve-3d; animation: spin-3d 15s infinite linear; }
        .face {
            position: absolute; bottom: 0; left: 0; width: 0; height: 0;
            border-left: 75px solid transparent; border-right: 75px solid transparent;
            border-bottom: 140px solid rgba(212, 175, 55, 0.1); transform-origin: 50% 100%;
            backdrop-filter: blur(1px); filter: drop-shadow(0 0 10px rgba(197, 131, 141, 0.4));
        }
        .front  { transform: rotateY(0deg) translateZ(75px) rotateX(31deg); border-bottom-color: rgba(197, 131, 141, 0.4); }
        .right  { transform: rotateY(90deg) translateZ(75px) rotateX(31deg); border-bottom-color: rgba(255, 255, 255, 0.1); }
        .back   { transform: rotateY(180deg) translateZ(75px) rotateX(31deg); border-bottom-color: rgba(74, 21, 75, 0.4); }
        .left   { transform: rotateY(-90deg) translateZ(75px) rotateX(31deg); border-bottom-color: rgba(212, 175, 55, 0.2); }

        .quantum-core-v2 {
            position: absolute; bottom: 45px; left: 50%; transform-style: preserve-3d;
            transform: translate(-50%, 0) translateZ(0); width: 32px; height: 32px;
            animation: core-wobble 5s infinite ease-in-out alternate;
        }
        .disk {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; border-radius: 50%;
            background: radial-gradient(circle, #fff 0%, #fff 15%, var(--c-rose) 40%, var(--c-purple) 70%, transparent 100%);
            box-shadow: 0 0 30px 10px var(--c-rose), 0 0 60px 20px var(--c-purple); opacity: 0.9; backdrop-filter: blur(2px);
        }
        .disk-xy { transform: rotateY(0deg) rotateX(0deg); } .disk-yz { transform: rotateY(90deg); } .disk-xz { transform: rotateX(90deg); }

        @keyframes spin-3d { 0% { transform: rotateX(-12deg) rotateY(0deg); } 100% { transform: rotateX(-12deg) rotateY(360deg); } }
        @keyframes core-wobble { 0% { transform: translate(-50%, 0) translateZ(-5px) scale(0.9); } 100% { transform: translate(-50%, 5px) translateZ(5px) scale(1.1); } }

        .glass-card { 
            background: rgba(20, 5, 30, 0.5); backdrop-filter: blur(12px); 
            border: 1px solid rgba(212, 175, 55, 0.15); box-shadow: 0 10px 40px rgba(0, 0, 0, 0.6), inset 0 0 20px rgba(212, 175, 55, 0.05);
            transition: all 0.3s ease; 
        }
        .gender-btn:hover { border-color: rgba(212, 175, 55, 0.6); transform: translateY(-3px); box-shadow: 0 15px 40px rgba(0, 0, 0, 0.8), 0 0 20px rgba(212, 175, 55, 0.2); }
        .option-item { border-left: 2px solid rgba(255,255,255,0.1); background: linear-gradient(90deg, rgba(255,255,255,0.03) 0%, transparent 100%); }
        .option-item:hover { border-left-color: var(--c-gold); background: linear-gradient(90deg, rgba(212, 175, 55, 0.1) 0%, transparent 100%); padding-left: 1.5rem; }

        .fade-enter-active, .fade-leave-active { transition: opacity 0.5s ease; }
        .fade-enter-from, .fade-leave-to { opacity: 0; }
        .slide-up-enter-active, .slide-up-leave-active { transition: all 0.4s ease; }
        .slide-up-enter-from { opacity: 0; transform: translateY(15px); }
        .slide-up-leave-to { opacity: 0; transform: translateY(-15px); }
    </style>
</head>
<body>
    <canvas id="starfield"></canvas>

    <div id="app" class="w-full h-screen flex flex-col relative z-20 overflow-y-auto">
        <div class="scene" :class="'state-' + phase">
            <div class="crystal">
                <div class="face front"></div><div class="face back"></div>
                <div class="face left"></div><div class="face right"></div>
                <div class="quantum-core-v2"><div class="disk disk-xy"></div><div class="disk disk-yz"></div><div class="disk disk-xz"></div></div>
            </div>
        </div>

        <header v-show="phase !== 'start'" class="fixed top-0 w-full p-6 flex justify-between items-center z-50 text-xs tracking-[0.2em] uppercase bg-gradient-to-b from-[#05020a] to-transparent">
            <div class="text-[#d4af37] font-bold">三 相 坍 缩</div>
            <div class="opacity-40 text-[#c5838d]">STONE · BLADE · FIELD</div>
        </header>

        <transition name="fade">
            <div v-if="phase === 'start'" class="absolute inset-0 flex flex-col justify-end items-center pb-[12vh] h-full">
                <div class="text-center mb-8">
                    <div class="text-3xl font-black tracking-[0.5em] text-transparent bg-clip-text bg-gradient-to-b from-white to-[#d4af37] mb-2 indent-2">三相坍缩</div>
                    <div class="text-[10px] text-[#c5838d] tracking-[0.4em] uppercase font-sans">SATABLE · SHARP · BROAD / TRI-PHASE DYNAMICS</div>
                </div>
                <button @click="enterSystem" class="px-12 py-4 bg-[#14051e]/60 border border-[#d4af37] text-[#d4af37] text-sm tracking-[0.3em] rounded backdrop-blur shadow-[0_0_15px_rgba(212,175,55,0.2)] hover:bg-[#d4af37] hover:text-black hover:shadow-[0_0_30px_rgba(212,175,55,0.6)] transition-all">
                    开启命运星轨
                </button>
            </div>
        </transition>

        <transition name="fade">
            <div v-if="phase === 'gender'" class="absolute inset-0 flex flex-col items-center justify-center w-full px-6 h-full mt-10">
                <div class="text-[#d4af37] tracking-[0.3em] text-sm mb-12 font-bold text-center">
                    <i class="fa-solid fa-eye text-[#c5838d] mb-3 text-xl block"></i>确立你的观测锚点
                </div>
                <div class="flex flex-col md:flex-row gap-6 w-full max-w-lg">
                    <div @click="selectGender('male')" class="gender-btn flex-1 glass-card p-10 rounded-lg cursor-pointer flex flex-col items-center group relative overflow-hidden">
                        <i class="fa-solid fa-mars text-4xl mb-4 text-[#c5838d] group-hover:text-[#d4af37] transition-colors"></i>
                        <span class="text-xl tracking-widest font-bold text-slate-200 group-hover:text-white">男</span>
                        <span class="text-[10px] text-[#c5838d]/60 mt-2 tracking-[0.2em] uppercase">Animus</span>
                    </div>
                    <div @click="selectGender('female')" class="gender-btn flex-1 glass-card p-10 rounded-lg cursor-pointer flex flex-col items-center group relative overflow-hidden">
                        <i class="fa-solid fa-venus text-4xl mb-4 text-[#c5838d] group-hover:text-[#d4af37] transition-colors"></i>
                        <span class="text-xl tracking-widest font-bold text-slate-200 group-hover:text-white">女</span>
                        <span class="text-[10px] text-[#c5838d]/60 mt-2 tracking-[0.2em] uppercase">Anima</span>
                    </div>
                </div>
            </div>
        </transition>

        <transition name="fade">
            <div v-if="phase === 'quiz'" class="absolute inset-0 flex flex-col items-center pt-32 pb-6 px-6 max-w-2xl mx-auto w-full h-full">
                <div class="w-full flex justify-between items-end mb-4 px-1">
                    <div @click="prevQuestion" class="cursor-pointer text-[#c5838d] hover:text-[#d4af37] transition-colors flex items-center gap-2 text-xs tracking-[0.2em] font-bold group">
                        <i class="fa-solid fa-arrow-left group-hover:-translate-x-1 transition-transform"></i> BACK
                    </div>
                    <div class="text-[#d4af37]/70 text-xs font-bold tracking-widest">PHASE {{ currentQIndex + 1 }} / {{ questions.length }}</div>
                </div>
                <div class="w-full h-1 bg-[#14051e] rounded-full mb-4 relative overflow-hidden border border-white/5">
                    <div class="h-full bg-gradient-to-r from-[#c5838d] to-[#d4af37] transition-all duration-500" :style="{ width: progressPercent + '%' }"></div>
                </div>

                <div class="w-full flex-1 flex flex-col justify-center relative overflow-y-auto pr-2 pb-8">
                    <transition name="slide-up" mode="out-in">
                        <div :key="currentQIndex" class="w-full">
                            <h2 class="text-[16px] md:text-xl font-medium leading-relaxed mb-8 text-slate-100 tracking-wide text-justify">
                                {{ currentQuestion.text }}
                            </h2>
                            <div class="space-y-4">
                                <div v-for="(opt, idx) in currentQuestion.shuffledOptions" :key="idx" @click="handleAnswer(opt.value)" 
                                     class="option-item glass-card p-4 md:p-5 rounded cursor-pointer text-slate-300 hover:text-white text-sm md:text-base leading-relaxed transition-all">
                                    {{ opt.text }}
                                </div>
                            </div>
                        </div>
                    </transition>
                </div>
            </div>
        </transition>

        <transition name="fade">
            <div v-if="phase === 'unlock'" class="absolute inset-0 flex flex-col items-center justify-center z-50 w-full px-6 h-full bg-[#05020a]/70 backdrop-blur-md">
                <div class="glass-card p-8 md:p-10 w-full max-w-sm flex flex-col items-center rounded-xl relative overflow-hidden">
                    <div class="absolute -top-10 -right-10 w-32 h-32 bg-[#d4af37] opacity-10 blur-3xl rounded-full"></div>
                    <div class="absolute -bottom-10 -left-10 w-32 h-32 bg-[#c5838d] opacity-10 blur-3xl rounded-full"></div>

                    <i class="fa-solid fa-lock text-4xl text-[#d4af37] mb-6 drop-shadow-[0_0_15px_rgba(212,175,55,0.6)]"></i>
                    <div class="text-[#d4af37] text-base tracking-[0.2em] font-bold mb-2 text-center">系统演算完毕</div>
                    <div class="text-[#c5838d] text-[10px] tracking-widest mb-8 text-center opacity-80 uppercase">Enter Access Key to Decode</div>
                    
                    <input v-model="unlockCode" type="text" placeholder="在此粘贴专属密钥" 
                           class="w-full px-4 py-3 mb-6 bg-[#14051e]/80 border border-[#d4af37]/30 text-center text-[#d4af37] rounded focus:border-[#d4af37] focus:outline-none transition-colors uppercase tracking-widest placeholder:text-slate-600 placeholder:text-xs shadow-[inset_0_0_10px_rgba(0,0,0,0.5)]">
                    
                    <button @click="verifyAndUnlock" :disabled="isVerifying" 
                            class="w-full py-4 bg-gradient-to-r from-[#2a113a] to-[#14051e] border border-[#d4af37] text-[#d4af37] font-bold rounded text-sm uppercase tracking-[0.2em] shadow-[0_0_15px_rgba(212,175,55,0.1)] hover:bg-[#d4af37] hover:text-black hover:shadow-[0_0_30px_rgba(212,175,55,0.4)] transition-all duration-300 flex items-center justify-center gap-3 disabled:opacity-50 disabled:cursor-not-allowed">
                        <span v-if="!isVerifying">开启完整报告</span>
                        <span v-else><i class="fa-solid fa-circle-notch fa-spin"></i> 链接节点中...</span>
                    </button>
                    <div v-if="unlockError" class="mt-4 text-red-500 text-xs tracking-widest">{{ unlockError }}</div>
                </div>
            </div>
        </transition>

    </div>

    <script>
        // 星海动画引擎
        const canvas = document.getElementById('starfield');
        const ctx = canvas.getContext('2d');
        let width, height, stars = [];
        function initStars() {
            width = canvas.width = window.innerWidth; height = canvas.height = window.innerHeight; stars = [];
            const starCount = window.innerWidth < 768 ? 400 : 800; 
            for (let i = 0; i < starCount; i++) { stars.push({ x: Math.random() * width, y: Math.random() * height, size: Math.random() * 1.8 + 0.2, speed: Math.random() * 2.5 + 1.0, alpha: Math.random() }); }
        }
        function animateStars() {
            ctx.fillStyle = 'rgba(5, 2, 10, 0.35)'; ctx.fillRect(0, 0, width, height); ctx.fillStyle = 'rgba(230, 200, 255, 1)';
            stars.forEach(star => {
                ctx.globalAlpha = star.alpha; ctx.beginPath(); ctx.arc(star.x, star.y, star.size, 0, Math.PI * 2); ctx.fill();
                star.y -= star.speed; star.alpha += (Math.random() - 0.5) * 0.08;
                if (star.alpha < 0.1) star.alpha = 0.1; if (star.alpha > 0.9) star.alpha = 0.9;
                if (star.y < 0) { star.y = height + 10; star.x = Math.random() * width; star.speed = Math.random() * 2.5 + 1.0; }
            });
            ctx.globalAlpha = 1; requestAnimationFrame(animateStars);
        }
        window.addEventListener('resize', initStars); initStars(); animateStars();

        // ================= 【女性专用 36 题 (A=石, B=布, C=剪)】 =================
        const FEMALE_QUESTIONS = [
            { text: "1. 在亲密关系中，你最看重的对方特质是？", options: [{ text: "忠诚可靠，让我感到安心稳定", value: "rock" }, { text: "能力强、有事业心，能提供资源或引领我成长", value: "paper" }, { text: "风趣幽默，能给我充足的情绪价值和浪漫体验", value: "scissors" }]},
            { text: "2. 当与伴侣发生分歧时，你通常的做法是？", options: [{ text: "暂时回避，等双方冷静后再沟通", value: "rock" }, { text: "明确表达自己的立场，要求对方给出解决方案", value: "paper" }, { text: "用撒娇、调侃或转移话题的方式缓和气氛", value: "scissors" }]},
            { text: "3. 在职场中，你更倾向于扮演哪种角色？", options: [{ text: "踏实执行者，将分内工作做到极致", value: "rock" }, { text: "团队协调者，善于维护关系和争取资源", value: "paper" }, { text: "灵活应变者，寻找快速晋升或跳槽的机会", value: "scissors" }]},
            { text: "4. 面对一位条件优秀但忽冷忽热的追求者，你会？", options: [{ text: "感到不安，希望对方给明确态度，否则选择退出", value: "rock" }, { text: "评估对方价值，若值得则主动争取关系主导权", value: "paper" }, { text: "享受这种拉扯，用若即若离的方式应对", value: "scissors" }]},
            { text: "5. 关于“付出”，你的态度更接近？", options: [{ text: "付出应当对等，我不喜欢单方面付出或索取", value: "rock" }, { text: "我愿意付出更多，但希望对方领情并尊重我的安排", value: "paper" }, { text: "我更擅长让别人为我付出，这让我有成就感", value: "scissors" }]},
            { text: "6. 在朋友圈中，你通常扮演什么角色？", options: [{ text: "靠谱的倾听者，朋友会找我倾诉，但我不是中心", value: "rock" }, { text: "组织者，经常张罗聚会，大家习惯听我安排", value: "paper" }, { text: "氛围担当，能和不同的人玩到一起，活跃气氛", value: "scissors" }]},
            { text: "7. 对于婚姻，你的看法更符合？", options: [{ text: "婚姻是人生的必经阶段，希望找合适的人踏实过日子", value: "rock" }, { text: "婚姻是资源整合，对方家庭、能力、人品都需要考量", value: "paper" }, { text: "不急于结婚，除非遇到能持续让我心动的人", value: "scissors" }]},
            { text: "8. 当你发现伴侣与异性有较亲密的工作往来，你会？", options: [{ text: "内心不舒服但不会直接说，会用暗示表达不满", value: "rock" }, { text: "明确划清边界，要求对方调整相处方式", value: "paper" }, { text: "表面不在意，但会通过提升自身魅力来吸引对方更多关注", value: "scissors" }]},
            { text: "9. 你更认同哪种消费观？", options: [{ text: "量入为出，注重储蓄，为未来做准备", value: "rock" }, { text: "投资型消费，愿意为提升资源、人脉、形象花钱", value: "paper" }, { text: "体验型消费，愿意为情绪价值和享受买单", value: "scissors" }]},
            { text: "10. 如果你和一个条件不如你但对你很好的人在一起，你更可能？", options: [{ text: "珍惜对方的真心，愿意一起努力改善生活", value: "rock" }, { text: "心里有优越感，但会掌控关系，让对方听话", value: "paper" }, { text: "时间久了可能会厌倦，觉得对方配不上自己", value: "scissors" }]},
            { text: "11. 在竞争环境中，你的表现通常是？", options: [{ text: "做好自己的事，不主动树敌，靠实力说话", value: "rock" }, { text: "拉拢盟友，借力打力，用资源和关系取胜", value: "paper" }, { text: "灵活应变，寻找捷径，必要时出其不意", value: "scissors" }]},
            { text: "12. 你更希望伴侣如何向你表达爱？", options: [{ text: "用行动证明，比如记住我的习惯、为我解决问题", value: "rock" }, { text: "给予实际资源，比如财务支持、事业帮助", value: "paper" }, { text: "提供情绪体验，比如浪漫仪式感、赞美和关注", value: "scissors" }]},
            { text: "13. 当你面临压力时，最可能的反应是？", options: [{ text: "默默承受，按照既定计划一步步解决", value: "rock" }, { text: "主动寻求他人帮助或调动资源来应对", value: "paper" }, { text: "暂时逃避，做点别的事情转移注意力", value: "scissors" }]},
            { text: "14. 你认为自己在人际交往中最大的优势是？", options: [{ text: "诚实守信，值得信赖", value: "rock" }, { text: "大局观强，能协调各方利益", value: "paper" }, { text: "善于沟通，能快速建立好感", value: "scissors" }]},
            { text: "15. 对于“规则”，你的态度是？", options: [{ text: "规则就应该遵守，这是社会运行的基础", value: "rock" }, { text: "规则可以为我所用，必要时可以调整", value: "paper" }, { text: "规则是用来突破的，按自己心意最重要", value: "scissors" }]},
            { text: "16. 在择偶时，你对“门当户对”的看法是？", options: [{ text: "比较重要，相似背景更容易长久", value: "rock" }, { text: "非常重要，这是关系稳定的基础", value: "paper" }, { text: "不太在意，感觉对了最重要", value: "scissors" }]},
            { text: "17. 当你被他人冒犯时，你更可能？", options: [{ text: "记在心里，但表面维持和平，以后慢慢疏远", value: "rock" }, { text: "当场指出，让对方知道你的底线", value: "paper" }, { text: "当时不发作，但会在合适的时机“还回去”", value: "scissors" }]},
            { text: "18. 你更享受哪种类型的社交活动？", options: [{ text: "小范围、深度的朋友聚会", value: "rock" }, { text: "有明确主题的商务或行业交流", value: "paper" }, { text: "新鲜有趣的派对或新奇体验", value: "scissors" }]},
            { text: "19. 你认为自己性格中最大的弱点是？", options: [{ text: "有时过于保守，不敢冒险", value: "rock" }, { text: "有时控制欲强，让人有压力", value: "paper" }, { text: "有时缺乏耐心，容易厌倦", value: "scissors" }]},
            { text: "20. 在团队合作中，你最反感的是？", options: [{ text: "有人不守承诺，拖累进度", value: "rock" }, { text: "有人挑战你的权威或打乱计划", value: "paper" }, { text: "有人限制你的发挥，规矩太多", value: "scissors" }]},
            { text: "21. 面对一个需要长期投入但回报稳定的事情，你会？", options: [{ text: "愿意坚持，相信积累的力量", value: "rock" }, { text: "会评估是否值得投入资源去主导", value: "paper" }, { text: "更倾向于找短期可见收益的机会", value: "scissors" }]},
            { text: "22. 你更认同哪种教育孩子的方式？", options: [{ text: "树立规矩，培养责任感和自律", value: "rock" }, { text: "提供资源，帮孩子建立人脉和眼界", value: "paper" }, { text: "鼓励自由发展，保护孩子的个性和创造力", value: "scissors" }]},

        function shuffleArray(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
            return array;
        }

        const { createApp, ref, computed } = Vue;

        createApp({
            setup() {
                const phase = ref('start'); 
                const gender = ref('');
                const currentQIndex = ref(0);
                const answers = ref([]);
                const questions = ref([]);

                const unlockCode = ref('');
                const unlockError = ref('');
                const isVerifying = ref(false);
                const finalArchetype = ref({});

                const enterSystem = () => { phase.value = 'gender'; };
                
                const selectGender = (g) => { 
                    gender.value = g; 
                    const sourceQuestions = (g === 'male') ? MALE_QUESTIONS : FEMALE_QUESTIONS;
                    questions.value = sourceQuestions.map(q => ({ 
                        ...q, 
                        shuffledOptions: shuffleArray([...q.options]) 
                    })); 
                    phase.value = 'quiz'; 
                };

                const handleAnswer = (val) => {
                    answers.value.push(val);
                    if (currentQIndex.value < questions.value.length - 1) {
                        currentQIndex.value++;
                    } else {
                        calculateResult();
                    }
                };

                const prevQuestion = () => {
                    if (currentQIndex.value > 0) {
                        currentQIndex.value--;
                        answers.value.pop();   
                    } else {
                        phase.value = 'gender';
                        answers.value = [];
                        currentQIndex.value = 0;
                    }
                };

                // 5. 核心：三相坍缩统计算法 (基于最新阈值规则)
                const calculateResult = () => {
                    const scores = { rock: 0, scissors: 0, paper: 0 };
                    
                    answers.value.forEach(ans => {
                        if (scores[ans] !== undefined) scores[ans]++;
                    });

                    // 将得分转化为数组并按分数降序排序
                    const sortedScores = Object.entries(scores).sort((a, b) => {
                        if (b[1] !== a[1]) return b[1] - a[1];
                        // 同分时的隐性阶层权重，避免完全平局（布 > 剪 > 石）
                        const weights = { paper: 3, scissors: 2, rock: 1 };
                        return weights[b[0]] - weights[a[0]];
                    });

                    const mainKey = sortedScores[0][0];      // 得分最高：主属性
                    const secondKey = sortedScores[1][0];    // 得分次高：副属性
                    const blindSpotKey = sortedScores[2][0]; // 得分最低：致命盲区

                    // --- 内部验证日志（符合你要求的“单一”与“混合”阈值判定逻辑） ---
                    const topScore = sortedScores[0][1];
                    const otherSum = sortedScores[1][1] + sortedScores[2][1];
                    const diff1_2 = sortedScores[0][1] - sortedScores[1][1];
                    
                    let archetypeType = "";
                    // 阈值规则1：单一倾向型（某类得分 >= 其他两类之和 且 >= 18）
                    if (topScore >= otherSum && topScore >= 18) {
                        archetypeType = "单一倾向型 (Single Dominant)";
                    } 
                    // 阈值规则2：混合倾向型（最高分与其他分差 <= 4）
                    else if (diff1_2 <= 4) {
                        archetypeType = "混合倾向型 (Mixed Dominant)";
                    } 
                    else {
                        archetypeType = "标准倾向型 (Standard)";
                    }
                    console.log(`【系统判定】${archetypeType} | 主核:${mainKey}(${topScore}分) 副相:${secondKey}(${sortedScores[1][1]}分) 盲区:${blindSpotKey}(${sortedScores[2][1]}分)`);
                    // -------------------------------------------------------------

                    // 存储结果供下一步跳转传递
                    finalArchetype.value = {
                        main: mainKey,      
                        second: secondKey,    
                        blindSpot: blindSpotKey  
                    };

                    // 切入解锁密码面板
                    phase.value = 'unlock';
                };

                const verifyAndUnlock = () => {
                    const codeToVerify = unlockCode.value.trim();
                    if (!codeToVerify) {
                        unlockError.value = "请填写观测密钥";
                        return;
                    }
                    
                    unlockError.value = "";
                    isVerifying.value = true;
                    
                    const params = new URLSearchParams({
                        g: gender.value,
                        m: finalArchetype.value.main,
                        s: finalArchetype.value.second,
                        w: finalArchetype.value.blindSpot,
                        code: codeToVerify 
                    });
                    
                    setTimeout(() => {
                        window.location.href = `report.html?${params.toString()}`;
                    }, 800);
                };

                const currentQuestion = computed(() => questions.value[currentQIndex.value]);
                const progressPercent = computed(() => questions.value.length === 0 ? 0 : ((currentQIndex.value + 1) / questions.value.length) * 100);

                return { 
                    phase, enterSystem, selectGender, questions, 
                    currentQIndex, currentQuestion, handleAnswer, 
                    progressPercent, prevQuestion,
                    unlockCode, unlockError, isVerifying, verifyAndUnlock 
                };
            }
